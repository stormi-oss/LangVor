name: langvor
description: Cross-platform translation practice app for English learners (A2-B1 → B2).
publish_to: 'none'
version: 1.1.0+3

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  
  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1
  
  # UI & Design
  flutter_animate: ^4.5.2
  flutter_quill: ^11.1.0
  
  # Utilities
  uuid: ^4.5.1
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  file_picker: ^8.1.6
  http: ^1.2.2
  crypto: ^3.0.6
  excel: ^4.0.6
  flutter_tts: ^4.2.0
  fl_chart: ^0.69.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
  assets:
    - assets/dictionary/en_ru_50k.json
    - assets/dictionary/en_words.txt
    - assets/grammar/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
